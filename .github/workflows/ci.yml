name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test ./...
      - run: go test -race ./...
      - run: go test -run '^$' -fuzz=FuzzDecodeMessageA -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzDecodeMessageB -fuzztime=10s ./...
      - run: go test -run '^$' -fuzz=FuzzDecodeMessageC -fuzztime=10s ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...
