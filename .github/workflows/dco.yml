name: DCO

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dco-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: DCO
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check commit signoffs
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request

          repo = os.environ["GH_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          signoff = re.compile(
              r"^Signed-off-by:\s+.+\s+<[^<>@\s]+@[^<>@\s]+>$",
              re.IGNORECASE | re.MULTILINE,
          )

          url = (
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}/commits"
              "?per_page=100"
          )
          missing = []

          while url:
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  commits = json.load(resp)
                  link = resp.headers.get("Link", "")

              for commit in commits:
                  sha = commit["sha"]
                  message = commit["commit"]["message"]
                  if not signoff.search(message):
                      missing.append((sha, message.splitlines()[0]))

              next_url = None
              for part in link.split(","):
                  if 'rel="next"' in part:
                      next_url = part[part.find("<") + 1 : part.find(">")]
                      break
              url = next_url

          if missing:
              for sha, subject in missing:
                  print(
                      f"::error title=Missing DCO signoff::"
                      f"{sha[:12]} {subject!r} lacks a Signed-off-by trailer"
                  )
              print()
              print("Every commit in this pull request must include a DCO signoff.")
              print("Use `git commit -s` for new commits.")
              print("For the latest commit, use `git commit --amend --no-edit -s`.")
              sys.exit(1)

          print("All pull request commits include Signed-off-by trailers.")
          PY

      - name: Skip non-PR event
        if: github.event_name != 'pull_request'
        run: echo "DCO is enforced on pull_request events."
