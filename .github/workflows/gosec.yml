name: Gosec Advisory

on:
  workflow_dispatch:
  # Keep advisory security scans manual until self-hosted runners are available.
  # schedule:
  #   - cron: '0 10 * * 1'

permissions:
  contents: read

concurrency:
  group: gosec-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gosec:
    name: Advisory Gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run advisory gosec scan
        id: gosec
        continue-on-error: true
        run: task gosec GOSEC='gosec -fmt sarif -out gosec.sarif'

      - name: Upload gosec SARIF artifact
        if: always() && hashFiles('gosec.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 14

      - name: Report advisory gosec result
        if: steps.gosec.outcome == 'failure'
        run: exit 1
