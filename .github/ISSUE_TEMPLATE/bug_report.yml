name: Bug report
description: Report a non-sensitive bug or documentation problem.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report vulnerabilities, suspected secret leaks, private exploit
        details, or embargoed findings in a public issue. Use the private
        reporting channels in SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected, and how severe is the issue?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, inputs, logs, or a minimal test case.
      placeholder: |
        go test ./...
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, commit SHA, or branch where you observed this.
      placeholder: v0.1.1
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
